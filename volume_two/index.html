<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD cover → YouTube playlist</title>

<style>
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .player {
    margin-top: 24px;
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 12px;
  }

  .cover {
    position: absolute;
    inset: 0;
    background: url('cover.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease;
    z-index: 2;
  }

  .play-btn {
    width: 70px;
    height: 70px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .play-btn::before {
    content: '';
    border-style: solid;
    border-width: 12px 0 12px 18px;
    border-color: transparent transparent transparent white;
    margin-left: 4px;
  }

/* základ (společný) */
.player iframe {
  position: absolute;
  border: none;
}

/* ✂️ OŘEZ (zoomnuté video) */
.player.crop iframe {
  top: 50%;
  left: 50%;
  width: 177%;
  height: 100%;
  transform: translate(-50%, -50%);
}

/* 📺 LETTERBOX (celé video) */
.player.letterbox iframe {
  inset: 0;
  width: 100%;
  height: 100%;
}

  .hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<div class="player letterbox" id="player">
  <div class="cover" id="cover">
    <div class="play-btn"></div>
  </div>
</div>

<script>
  const player = document.getElementById('player');
  const cover = document.getElementById('cover');

  player.addEventListener('click', () => {
    const iframe = document.createElement('iframe');

    iframe.src = "https://www.youtube.com/embed/videoseries?list=PLDHs-YdooiNkIZvwLPne0CrqAjDp8yUQQ&autoplay=1";

    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
    iframe.allowFullscreen = true;
    iframe.referrerPolicy = "strict-origin-when-cross-origin";

    player.appendChild(iframe);

    cover.classList.add('hidden');
  });
</script>

</body>
</html>
